name: Daily PR Briefing

on:
  schedule:
    # 07:00 UTC = 08:00 BST (summer) / 07:00 GMT (winter)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:   # manual trigger for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily briefing and send digest email
        run: python -m services.autonomous_engine --send-digest --force
        env:
          ANTHROPIC_API_KEY:                   ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSCATCHER_API_KEY:                 ${{ secrets.NEWSCATCHER_API_KEY }}
          DIGEST_EMAIL_TO:                     ${{ secrets.DIGEST_EMAIL_TO }}
          SMTP_USER:                           ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:                       ${{ secrets.SMTP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
          GOOGLE_DRIVE_FOLDER_ID:              ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
