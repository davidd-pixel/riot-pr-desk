name: Keepalive

# Runs every Sunday at 06:00 UTC — keeps the repo active so GitHub
# doesn't disable the Daily PR Briefing scheduled workflow.

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep workflow active
        uses: gautamkrishnar/keepalive-workflow@v2
